<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Focus Guard 到点确认</title>
    <link rel="stylesheet" href="interstitial.css" />
  </head>
  <body>
    <main class="shell">
      <section class="prompt">
        <p class="eyebrow">FOCUS GUARD</p>
        <h1>10 分钟到了。</h1>
        <p id="expired-target" class="target"></p>
        <p class="empty">
          你刚才的目的：<strong id="expired-reason"></strong>
        </p>
        <div class="force-actions" aria-label="到点后的选择">
          <button id="continue-study" class="primary-action" type="button">
            我还在学习，再给 10 分钟
          </button>
          <button id="finish-session" class="secondary-action" type="button">
            结束并关闭这个标签页
          </button>
        </div>
      </section>
    </main>
    <script src="expired.js"></script>
  </body>
</html>
